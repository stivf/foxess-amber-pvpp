# Battery Brain — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Single worker, no hot reload, non-root user, read-only source

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data        # SQLite DB persisted on host (backup = copy this dir)
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - DB_PATH=/app/data/battery_brain.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000
        - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4001
    restart: unless-stopped
