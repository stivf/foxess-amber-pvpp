# Battery Brain — Development Docker Compose
# Usage: docker compose up
# Hot reload: src/ is volume-mounted; uvicorn --reload watches for changes

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src          # Hot reload — edit code without rebuilding
      - ./data:/app/data        # SQLite DB + migrations persisted on host
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - DB_PATH=/app/data/battery_brain.db
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 3000
      --reload
      --reload-dir /app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
