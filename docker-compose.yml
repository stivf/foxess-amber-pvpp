# Battery Brain — Development Docker Compose
# Usage: docker compose up
# Hot reload: src/ is volume-mounted; uvicorn --reload watches for changes

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4000:4000"
    volumes:
      - ./src:/app/src          # Hot reload — edit code without rebuilding
      - ./data:/app/data        # SQLite DB + migrations persisted on host
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - DB_PATH=/app/data/battery_brain.db
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 4000
      --reload
      --reload-dir /app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    ports:
      - "4001:4001"
    volumes:
      - ./frontend:/app         # Hot reload — edit code without rebuilding
      - /app/node_modules       # Preserve container node_modules
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_KEY=${API_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    command: npx next dev -p 4001
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    volumes:
      - ./src:/app/src
      - ./backend:/app/backend
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - ENVIRONMENT=test
      - DB_PATH=/tmp/test_battery_brain.db
    profiles:
      - test
